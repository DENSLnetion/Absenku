<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FFF8F5" id="meta-theme-color">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Absenku">
<title>Absenku</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app" class="app">
  <div id="scr-onboarding" class="screen"></div>
  <div id="scr-main" class="screen">
    <div id="tabs-wrap" class="tabs-wrap">
      <div id="tab-dashboard" class="scroll-y pad-h tab-panel" data-tab-index="0" style="display:flex;flex-direction:column;gap:16px;padding-top:16px;padding-bottom:100px;"></div>
      <div id="tab-kelas" class="scroll-y pad-h tab-panel" data-tab-index="1" style="display:flex;flex-direction:column;gap:16px;padding-top:16px;padding-bottom:100px;"></div>
      <div id="tab-riwayat" class="stack tab-panel" data-tab-index="2" style="overflow:hidden;"></div>
    </div>
    <div id="fab-scrim" class="fab-scrim"></div>
    <div class="fab-wrap" id="fab-wrap"></div>
    <div class="navbar">
      <button class="nav-btn active" data-tab="dashboard">
        <span class="navpill"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 13h6V4H4v9zm0 7h6v-5H4v5zm10 0h6V11h-6v9zm0-16v5h6V4h-6z"/></svg></span>
        <span>Dashboard</span>
      </button>
      <button class="nav-btn" data-tab="kelas">
        <span class="navpill"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg></span>
        <span>Kelas</span>
      </button>
      <button class="nav-btn" data-tab="riwayat">
        <span class="navpill"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm.5 4H12v6l4.7 2.8.8-1.3-4-2.4V7z"/></svg></span>
        <span>Riwayat</span>
      </button>
    </div>
  </div>
  <div id="scr-quickcheck" class="screen"></div>
  <div id="scr-recap" class="screen"></div>
  <div id="scr-settings" class="screen"></div>
  <!-- Dedicated Screen for Aesthetic Absen Flow -->
  <div id="scr-absen-flow" class="screen" style="background: var(--clr-surface); overflow: hidden;"></div>
  <div id="scr-pindah-flow" class="screen" style="background: var(--clr-surface); overflow: hidden;"></div>
</div>
<div id="scrim" class="scrim"></div>
<div id="sheet-container"></div>
<div id="dialog-container"></div>
<div id="sidepanel" class="sidepanel"></div>
<div class="snackbar-host" id="snackbar-host"></div>
<script src="js/app.js" defer></script>
</body>
</html>
